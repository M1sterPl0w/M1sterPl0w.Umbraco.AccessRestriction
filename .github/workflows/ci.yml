name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: M1sterPl0w.Umbraco.AccessRestriction/Client/package-lock.json

      - name: Install frontend dependencies
        working-directory: M1sterPl0w.Umbraco.AccessRestriction/Client
        run: npm ci

      - name: Build frontend (Vite → wwwroot/App_Plugins)
        working-directory: M1sterPl0w.Umbraco.AccessRestriction/Client
        run: npm run build

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack (dry-run)
        run: dotnet pack --configuration Release --no-build -p:Version=0.0.0-ci
